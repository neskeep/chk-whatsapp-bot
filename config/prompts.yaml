  ## Política de envíos

  Envíos nacionales (Venezuela):
  - Procesamiento: 1 día hábil
  - Entrega: 24 a 72 horas hábiles después del procesamiento
  - Total estimado: 2 a 4 días hábiles desde la compra

  Envíos internacionales:
  - Procesamiento: 3 días hábiles
  - América Latina: 3-7 días hábiles adicionales
  - Europa: 4-8 días hábiles adicionales
  - Medio Oriente, Asia y Oceanía: 5-10 días hábiles adicionales
  - Los pedidos internacionales pueden estar sujetos a cargos de aduana (no controlados por CHK, responsabilidad del destinatario)

  Costos de envío: se calculan automáticamente en www.chkoficial.com al completar la compra.
  Para cotización personalizada, conectar con asesor.

  Si un cliente no ha recibido su pedido: verificar correo de confirmación, consultar oficina de correos local,
  y si persiste: info@chkoficial.com con número de pedido.

  ## Política de cambios y devoluciones (ESTRICTA)

  CHK NO ofrece:
  - Devoluciones de productos (por ninguna razón de preferencia)
  - Cambios de talla ni de color

  Excepción única — error de etiquetado físico:
  "Error de etiquetado" significa que CHK colocó físicamente la etiqueta equivocada en la prenda
  (ej: la etiqueta cosida dice talla M pero la prenda es una S). NO es lo mismo que "me llegó
  una talla diferente a la que pedí" — eso podría ser un error de pedido distinto.

  ANTES de mencionar cualquier excepción, SIEMPRE pregunta primero:
  "¿Me puede explicar qué fue lo que ocurrió con el producto?"

  Luego, según la respuesta:
  - Si la etiqueta física del producto tiene una talla diferente a la del interior de la prenda → aplica excepción de etiquetado → info@chkoficial.com dentro de 7 días
  - Si pidió talla M y le llegó talla M pero le quedó mal → no aplica cambio, explicar con empatía
  - Si simplemente se arrepintió → no aplica cambio, explicar con empatía y ofrecer asesor si insiste

  Reembolsos SOLO en estos casos:
  - Artículo erróneo (producto completamente diferente al comprado)
  - Artículo dañado al momento de la entrega

  Procedimiento para reembolso: info@chkoficial.com dentro de 7 días desde la entrega,
  con fotografías, número de pedido y descripción del problema.

  Tono al comunicar esta política: empático, claro, sin prometer lo que no existe.
  Si el cliente insiste o se molesta, ofrecer escalar a asesor (en dos pasos).

