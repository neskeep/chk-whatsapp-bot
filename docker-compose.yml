version: "3.8"
services:
  agent:
    build: .
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      - ./knowledge:/app/knowledge
      - ./config:/app/config
      - ./data:/app/data
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - agent
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
